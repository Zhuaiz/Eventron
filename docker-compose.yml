services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventron
      POSTGRES_PASSWORD: eventron
      POSTGRES_DB: eventron
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventron"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eventron:eventron@postgres:5432/eventron
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  web:
    image: node:20-alpine
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_BASE: http://app:8000
    depends_on:
      - app

volumes:
  pgdata:
  web_node_modules:
