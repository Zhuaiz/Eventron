# ============================================================
# Eventron — Nginx reverse proxy config
# ============================================================

upstream eventron_api {
    server app:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name event.bheartmedia.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name event.bheartmedia.com;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/event.bheartmedia.com.pem;
    ssl_certificate_key /etc/nginx/ssl/event.bheartmedia.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── HSTS ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50m;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Frontend (Vite build output) ──────────────────────────
    location / {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (agent chat streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Public check-in routes ────────────────────────────────
    location /p/ {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Agent chat SSE ────────────────────────────────────────
    location /agent/ {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ── Static assets cache ───────────────────────────────────
    location /assets/ {
        proxy_pass http://eventron_api;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── Health check (plain HTTP, for internal monitoring) ────────
server {
    listen 80 default_server;
    server_name _;

    location /health {
        proxy_pass http://eventron_api;
    }

    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Catch-all: redirect to HTTPS
    location / {
        return 301 https://event.bheartmedia.com$request_uri;
    }
}
