# ============================================================
# Eventron — Nginx reverse proxy config
# ============================================================

upstream eventron_api {
    server app:8000;
}

# HTTP → redirect to HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # ── SSL (uncomment when cert is ready) ────────────────────
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Frontend (Vite build output) ──────────────────────────
    location / {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (agent chat streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Public check-in routes ────────────────────────────────
    location /p/ {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Agent chat SSE ────────────────────────────────────────
    location /agent/ {
        proxy_pass http://eventron_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ── Static assets cache ───────────────────────────────────
    location /assets/ {
        proxy_pass http://eventron_api;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (for monitoring) ─────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
