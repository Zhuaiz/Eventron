<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ event_name }} — 签到</title>
<style>
{{ css }}
</style>
</head>
<body>
<div class="page" id="app">
  <!-- Background decoration -->
  <div class="bg-skyline"></div>
  <div class="bg-glow"></div>

  <!-- Header -->
  <header class="header">
    <h1 class="event-title">{{ event_name }}</h1>
    {% if event_date %}<p class="event-meta">{{ event_date }}</p>{% endif %}
    {% if event_location %}<p class="event-meta loc">{{ event_location }}</p>{% endif %}
  </header>

  <!-- Search Section -->
  <section class="search-card" id="search-section">
    <form class="search-form" id="checkin-form" onsubmit="return false;">
      <input
        type="text"
        class="search-input"
        id="name-input"
        placeholder="请输入您的姓名"
        autocomplete="off"
        autofocus
      >
      <button type="button" class="search-btn" id="search-btn" onclick="doSearch()">
        搜索
      </button>
    </form>
  </section>

  <!-- Result Section: shown after lookup, before user confirms.
       JS fills #name-display / #seat-display / #zone-display. -->
  <section class="result-card" id="result-section" style="display:none;">
    <p class="result-greeting">
      尊敬的 <span id="name-display" class="result-name"></span>
    </p>
    <div class="result-info">
      <div class="result-row">
        <span class="result-key">您的席位</span>
        <span class="result-val" id="seat-display"></span>
      </div>
      <div class="result-row">
        <span class="result-key">所在区域</span>
        <span class="result-val" id="zone-display"></span>
      </div>
    </div>
    <p class="result-hint">点击下方按钮完成签到</p>
  </section>

  <!-- Confirm button: revealed by JS once a unique match is found. -->
  <button
    type="button"
    class="confirm-btn"
    id="confirm-btn"
    onclick="doConfirm()"
    style="display:none;"
  >
    签到
  </button>

  <!-- Candidates Section (for disambiguation) -->
  <section class="candidates-card" id="candidates-section" style="display:none;">
    <p class="cand-title">找到多位同名人员，请选择：</p>
    <div id="candidates-list"></div>
  </section>

  <!-- Success Section -->
  <section class="success-card" id="success-section" style="display:none;">
    <div class="success-icon">✓</div>
    <h2 class="success-name" id="success-name"></h2>
    <p class="success-msg" id="success-msg">签到成功</p>
    <div class="seat-info" id="seat-info" style="display:none;">
      <span class="seat-label" id="seat-label"></span>
    </div>
    <button class="btn-secondary" onclick="resetPage()">返回</button>
  </section>

  <!-- Stats bar -->
  <section class="stats-bar" id="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="stat-total">{{ total }}</span>
      <span class="stat-lbl">总人数</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num accent" id="stat-checked">{{ checked_in }}</span>
      <span class="stat-lbl">已签到</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="stat-rate">{{ rate }}%</span>
      <span class="stat-lbl">签到率</span>
    </div>
  </section>
</div>

<script>
var EVENT_ID = "{{ event_id }}";
</script>
<script>
{{ js }}
</script>
</body>
</html>
