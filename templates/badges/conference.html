<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
{{ css }}
</style>
</head>
<body>
{% for attendee in attendees %}
<div class="badge">
  <!-- Top decorative border -->
  <div class="top-border"></div>

  <!-- Header area: logo placeholder + event name -->
  <div class="badge-header">
    <div class="logo-area">
      <svg viewBox="0 0 40 40" class="logo-svg">
        <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <circle cx="20" cy="20" r="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
        <circle cx="20" cy="12" r="3" fill="rgba(79,172,254,0.8)"/>
        <path d="M10 28 Q20 18 30 28" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="event-slogan">{{ event_date }}</div>
      <div class="event-name">{{ event_name }}</div>
    </div>
  </div>

  <!-- White name band -->
  <div class="name-band">
    <div class="attendee-name">{{ attendee.name }}</div>
    {% if attendee.organization %}<div class="attendee-org">{{ attendee.organization }}</div>{% endif %}
    {% if attendee.title %}<div class="attendee-title">{{ attendee.title }}</div>{% endif %}
  </div>

  <!-- Footer area with role and decorations -->
  <div class="badge-footer">
    <span class="role-tag" style="background:{{ attendee.role_color }};color:{{ attendee.role_text }}">{{ attendee.role_label }}</span>
    {% if attendee.qr_data %}<img class="qr" src="{{ attendee.qr_data }}" alt="QR">{% endif %}
  </div>

  <!-- Bottom cityscape decoration -->
  <div class="cityscape">
    <svg viewBox="0 0 340 80" preserveAspectRatio="none" class="city-svg">
      <!-- Buildings -->
      <rect x="10" y="25" width="18" height="55" fill="rgba(255,255,255,0.06)" rx="1"/>
      <rect x="14" y="30" width="3" height="3" fill="rgba(79,172,254,0.3)" rx="0.5"/>
      <rect x="14" y="36" width="3" height="3" fill="rgba(79,172,254,0.15)" rx="0.5"/>
      <rect x="14" y="42" width="3" height="3" fill="rgba(79,172,254,0.25)" rx="0.5"/>
      <rect x="20" y="36" width="3" height="3" fill="rgba(79,172,254,0.2)" rx="0.5"/>

      <rect x="35" y="10" width="22" height="70" fill="rgba(255,255,255,0.08)" rx="1"/>
      <rect x="40" y="15" width="3" height="3" fill="rgba(79,172,254,0.3)" rx="0.5"/>
      <rect x="46" y="15" width="3" height="3" fill="rgba(255,200,50,0.3)" rx="0.5"/>
      <rect x="40" y="22" width="3" height="3" fill="rgba(79,172,254,0.2)" rx="0.5"/>
      <rect x="46" y="22" width="3" height="3" fill="rgba(79,172,254,0.15)" rx="0.5"/>
      <rect x="40" y="29" width="3" height="3" fill="rgba(255,200,50,0.2)" rx="0.5"/>
      <rect x="46" y="29" width="3" height="3" fill="rgba(79,172,254,0.25)" rx="0.5"/>
      <rect x="40" y="36" width="3" height="3" fill="rgba(79,172,254,0.15)" rx="0.5"/>
      <rect x="46" y="36" width="3" height="3" fill="rgba(255,200,50,0.15)" rx="0.5"/>

      <rect x="65" y="20" width="16" height="60" fill="rgba(255,255,255,0.05)" rx="1"/>
      <rect x="69" y="25" width="3" height="3" fill="rgba(79,172,254,0.2)" rx="0.5"/>
      <rect x="69" y="32" width="3" height="3" fill="rgba(255,200,50,0.25)" rx="0.5"/>
      <rect x="75" y="25" width="3" height="3" fill="rgba(79,172,254,0.15)" rx="0.5"/>

      <!-- Tall center tower -->
      <rect x="140" y="5" width="28" height="75" fill="rgba(255,255,255,0.07)" rx="2"/>
      <rect x="142" y="0" width="24" height="8" fill="rgba(255,255,255,0.04)" rx="1"/>
      <rect x="146" y="12" width="4" height="4" fill="rgba(79,172,254,0.3)" rx="0.5"/>
      <rect x="154" y="12" width="4" height="4" fill="rgba(255,200,50,0.2)" rx="0.5"/>
      <rect x="146" y="20" width="4" height="4" fill="rgba(79,172,254,0.2)" rx="0.5"/>
      <rect x="154" y="20" width="4" height="4" fill="rgba(79,172,254,0.15)" rx="0.5"/>
      <rect x="146" y="28" width="4" height="4" fill="rgba(255,200,50,0.25)" rx="0.5"/>
      <rect x="154" y="28" width="4" height="4" fill="rgba(79,172,254,0.2)" rx="0.5"/>
      <rect x="146" y="36" width="4" height="4" fill="rgba(79,172,254,0.15)" rx="0.5"/>
      <rect x="154" y="36" width="4" height="4" fill="rgba(255,200,50,0.15)" rx="0.5"/>

      <rect x="175" y="18" width="20" height="62" fill="rgba(255,255,255,0.06)" rx="1"/>
      <rect x="180" y="24" width="3" height="3" fill="rgba(79,172,254,0.25)" rx="0.5"/>
      <rect x="186" y="24" width="3" height="3" fill="rgba(79,172,254,0.15)" rx="0.5"/>
      <rect x="180" y="31" width="3" height="3" fill="rgba(255,200,50,0.2)" rx="0.5"/>

      <rect x="260" y="15" width="18" height="65" fill="rgba(255,255,255,0.06)" rx="1"/>
      <rect x="264" y="20" width="3" height="3" fill="rgba(79,172,254,0.2)" rx="0.5"/>
      <rect x="270" y="20" width="3" height="3" fill="rgba(255,200,50,0.2)" rx="0.5"/>
      <rect x="264" y="27" width="3" height="3" fill="rgba(79,172,254,0.15)" rx="0.5"/>

      <rect x="285" y="30" width="22" height="50" fill="rgba(255,255,255,0.05)" rx="1"/>
      <rect x="290" y="35" width="3" height="3" fill="rgba(79,172,254,0.2)" rx="0.5"/>
      <rect x="296" y="35" width="3" height="3" fill="rgba(255,200,50,0.15)" rx="0.5"/>

      <rect x="315" y="22" width="15" height="58" fill="rgba(255,255,255,0.06)" rx="1"/>

      <!-- Light streaks at bottom -->
      <line x1="0" y1="72" x2="340" y2="72" stroke="rgba(79,172,254,0.15)" stroke-width="0.5"/>
      <line x1="0" y1="75" x2="340" y2="75" stroke="rgba(226,185,59,0.12)" stroke-width="0.8"/>
    </svg>
  </div>

  <!-- Light glow circles -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Bottom accent bar -->
  <div class="accent-bar"></div>
</div>
{% endfor %}
</body>
</html>
