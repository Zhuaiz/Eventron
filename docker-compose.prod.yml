# ============================================================
# Eventron — Production Docker Compose (阿里云)
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-eventron}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventron}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposed — only internal network
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eventron}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eventron}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    networks:
      - backend
    # Health check for nginx upstream
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/eventron/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend

volumes:
  pgdata:
  redisdata:
  app_data:
  app_uploads:

networks:
  backend:
    driver: bridge
