# ============================================================
# Eventron CD — Deploy to Aliyun (上海)
# Triggers: push to main (after CI passes)
# Strategy: SSH → git pull → docker compose build → up
# (在服务器上构建，避免跨境传输大镜像)
# ============================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

concurrency:
  group: deploy-production
  cancel-in-progress: false  # 不中断正在进行的部署

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: prod
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail

            DEPLOY_DIR=/opt/eventron
            REPO_URL=https://${{ secrets.GH_PAT }}@github.com/AntiNoise-ai/Eventron.git

            echo "=== [1/5] 拉取最新代码 ==="
            if [ ! -d "$DEPLOY_DIR/repo" ]; then
                git clone "$REPO_URL" "$DEPLOY_DIR/repo"
            else
                cd "$DEPLOY_DIR/repo"
                git remote set-url origin "$REPO_URL"
                git fetch origin main
                git reset --hard origin/main
                # 清掉 token
                git remote set-url origin https://github.com/AntiNoise-ai/Eventron.git
            fi

            cd "$DEPLOY_DIR/repo"

            echo "=== [2/5] 同步 .env ==="
            if [ ! -f "$DEPLOY_DIR/.env" ]; then
                echo "❌ 缺少 $DEPLOY_DIR/.env，请先配置！"
                exit 1
            fi
            cp "$DEPLOY_DIR/.env" .env

            echo "=== [3/5] 构建镜像 ==="
            docker compose -f docker-compose.prod.yml build --no-cache app

            echo "=== [4/5] 滚动更新 ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== [5/5] 清理旧镜像 ==="
            docker image prune -f

            echo "=== 等待健康检查 ==="
            sleep 10
            if curl -sf http://localhost/health > /dev/null; then
                echo "✅ 部署成功！"
            else
                echo "⚠️ 健康检查未通过，查看日志："
                docker compose -f docker-compose.prod.yml logs --tail=30 app
                exit 1
            fi

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployed successfully to ${{ secrets.SERVER_HOST }}"
          else
            echo "❌ Deployment failed"
          fi
