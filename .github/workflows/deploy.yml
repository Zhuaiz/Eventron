# ============================================================
# Eventron CD — Deploy to Aliyun (上海)
# Triggers: push to main (after CI passes)
# Strategy: rsync 从 Actions runner 推代码到服务器（服务器无需访问 GitHub）
# ============================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Generate .env from template + secrets
        run: |
          envsubst < deploy/.env.prod.template > .env.generated
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_ACCESS_KEY_SECRET: ${{ secrets.QWEN_ACCESS_KEY_SECRET }}
          WECOM_BOT_SECRET: ${{ secrets.WECOM_BOT_SECRET }}
          WECOM_BOT_TOKEN: ${{ secrets.WECOM_BOT_TOKEN }}
          WECOM_BOT_AES_KEY: ${{ secrets.WECOM_BOT_AES_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Rsync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='pgdata/' \
            --exclude='web/node_modules/' \
            --exclude='web/dist/' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -p 22" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/eventron/repo/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            DEPLOY_DIR=/opt/eventron

            cd "$DEPLOY_DIR/repo"

            echo "=== [1/4] 同步 .env (CI 自动生成) ==="
            if [ -f "$DEPLOY_DIR/repo/.env.generated" ]; then
                cp "$DEPLOY_DIR/repo/.env.generated" .env
                rm -f "$DEPLOY_DIR/repo/.env.generated"
                echo "✅ .env 由 CI 自动生成"
            elif [ -f "$DEPLOY_DIR/.env" ]; then
                cp "$DEPLOY_DIR/.env" .env
                echo "⚠️ 使用服务器本地 .env（fallback）"
            else
                echo "❌ 无 .env 来源！请配置 GitHub Secrets"
                exit 1
            fi

            echo "=== [1.5/4] 拉取 SSL 证书 ==="
            mkdir -p /opt/eventron/ssl
            bash deploy/cert-pull.sh || {
                echo "⚠️ 证书拉取失败，检查是否首次部署"
                # 如果 ssl 目录为空，放一个自签名证书让 nginx 能启动
                if [ ! -f /opt/eventron/ssl/bheartmedia.com.pem ]; then
                    echo "生成临时自签名证书..."
                    openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                        -keyout /opt/eventron/ssl/bheartmedia.com.key \
                        -out /opt/eventron/ssl/bheartmedia.com.pem \
                        -subj "/CN=bheartmedia.com" 2>/dev/null
                fi
            }

            echo "=== [2/4] 构建镜像 ==="
            docker compose -f docker-compose.prod.yml build app 2>&1 || {
                echo "⚠️ 构建失败，重试一次..."
                docker compose -f docker-compose.prod.yml build app
            }

            echo "=== [3/4] 滚动更新 ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== [4/4] 清理旧镜像 ==="
            docker image prune -f

            echo "=== 等待健康检查 ==="
            sleep 10
            if curl -sf http://localhost/health > /dev/null; then
                echo "✅ 部署成功！"
            else
                echo "⚠️ 健康检查未通过，查看日志："
                docker compose -f docker-compose.prod.yml logs --tail=30 app
                exit 1
            fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployed successfully to ${{ secrets.SERVER_HOST }}"
          else
            echo "❌ Deployment failed"
          fi
