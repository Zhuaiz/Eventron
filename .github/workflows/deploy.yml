# ============================================================
# Eventron CD — Deploy to Aliyun (上海)
# Triggers: push to main (after CI passes)
# Strategy: rsync 从 Actions runner 推代码到服务器（服务器无需访问 GitHub）
# ============================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_PASSWORD }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='pgdata/' \
            --exclude='web/node_modules/' \
            --exclude='web/dist/' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -p 22" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/eventron/repo/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            DEPLOY_DIR=/opt/eventron

            cd "$DEPLOY_DIR/repo"

            echo "=== [1/4] 同步 .env ==="
            if [ ! -f "$DEPLOY_DIR/.env" ]; then
                echo "❌ 缺少 $DEPLOY_DIR/.env，请先配置！"
                exit 1
            fi
            cp "$DEPLOY_DIR/.env" .env

            echo "=== [2/4] 构建镜像 ==="
            docker compose -f docker-compose.prod.yml build app

            echo "=== [3/4] 滚动更新 ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== [4/4] 清理旧镜像 ==="
            docker image prune -f

            echo "=== 等待健康检查 ==="
            sleep 10
            if curl -sf http://localhost/health > /dev/null; then
                echo "✅ 部署成功！"
            else
                echo "⚠️ 健康检查未通过，查看日志："
                docker compose -f docker-compose.prod.yml logs --tail=30 app
                exit 1
            fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployed successfully to ${{ secrets.SERVER_HOST }}"
          else
            echo "❌ Deployment failed"
          fi
