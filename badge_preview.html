<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
/* Conference vertical badge — 90mm × 130mm
   Deep blue gradient + white name band + city skyline decoration
   Based on professional conference badge designs (e.g. China Mobile style) */
@page {
  size: 90mm 130mm;
  margin: 0;
}
@media print {
  body { margin: 0; }
  .badge { page-break-after: always; }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0; padding: 0;
  font-family: "Noto Sans CJK SC", "Noto Sans SC", "Source Han Sans SC",
    "Droid Sans Fallback", "PingFang SC", "Microsoft YaHei",
    "Helvetica Neue", sans-serif;
  background: #e0e0e0;
}

/* ── Badge container (vertical) ── */
.badge {
  width: 90mm;
  height: 130mm;
  page-break-after: always;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg,
    #0a1e3d 0%,
    #0d2a52 20%,
    #103570 40%,
    #0d2a52 70%,
    #050e25 100%);
  color: #ffffff;
  margin: 0 auto;
}

/* ── Top colored border ── */
.top-border {
  height: 1.8mm;
  flex-shrink: 0;
  background: linear-gradient(90deg,
    #1976d2 0%, #42a5f5 25%, #66bb6a 40%,
    #fdd835 55%, #ef5350 75%, #ab47bc 100%);
}

/* ── Header: logo + event info ── */
.badge-header {
  display: flex;
  align-items: center;
  padding: 5mm 5mm 3mm;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
.logo-area {
  flex-shrink: 0;
  margin-right: 3mm;
}
.logo-svg {
  width: 12mm;
  height: 12mm;
}
.header-text {
  flex: 1;
  min-width: 0;
}
.event-slogan {
  font-size: 5.5pt;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.5pt;
  margin-bottom: 0.8mm;
}
.event-name {
  font-size: 12pt;
  font-weight: 800;
  letter-spacing: 1pt;
  color: #ffffff;
  line-height: 1.3;
  text-shadow: 0 1mm 3mm rgba(0,0,0,0.4);
}

/* ── White name band (center) ── */
.name-band {
  background: #ffffff;
  padding: 5mm 5mm;
  text-align: left;
  margin: 2mm 0 0;
  position: relative;
  z-index: 2;
  min-height: 28mm;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.attendee-name {
  font-size: 26pt;
  font-weight: 900;
  color: #1a1a2e;
  letter-spacing: 3pt;
  line-height: 1.2;
}
.attendee-org {
  font-size: 8pt;
  color: #555555;
  margin-top: 2mm;
  letter-spacing: 0.3pt;
}
.attendee-title {
  font-size: 7pt;
  color: #999999;
  margin-top: 0.5mm;
}

/* ── Footer: role tag ── */
.badge-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2mm 5mm 0;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
.role-tag {
  display: inline-block;
  font-size: 7pt;
  padding: 1mm 3.5mm;
  border-radius: 1.5mm;
  font-weight: 700;
  letter-spacing: 0.5pt;
}
.qr {
  width: 12mm;
  height: 12mm;
  border-radius: 1mm;
  background: white;
  padding: 0.5mm;
}

/* ── Cityscape SVG at bottom ── */
.cityscape {
  position: absolute;
  bottom: 2mm;
  left: 0;
  right: 0;
  height: 25mm;
  z-index: 1;
  pointer-events: none;
}
.city-svg {
  width: 100%;
  height: 100%;
}

/* ── Glow circles (decorative) ── */
.glow {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
}
.glow-1 {
  width: 50mm;
  height: 50mm;
  bottom: 10mm;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle,
    rgba(79,172,254,0.08) 0%,
    rgba(79,172,254,0.04) 40%,
    transparent 70%);
}
.glow-2 {
  width: 30mm;
  height: 30mm;
  bottom: 15mm;
  left: 50%;
  transform: translateX(-50%);
  border: 0.3mm solid rgba(79,172,254,0.1);
  background: transparent;
}

/* ── Bottom accent bar ── */
.accent-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3mm;
  z-index: 3;
  background: linear-gradient(90deg,
    #ef5350 0%, #ff7043 20%, #ffa726 35%,
    #ffffff 50%,
    #42a5f5 65%, #1976d2 80%, #1565c0 100%);
  opacity: 0.8;
  filter: blur(0.3mm);
}

</style>
